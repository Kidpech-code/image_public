<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kidpech CV</title>
    <meta http-equiv="refresh" content="0; url=./kidpech-cv.pdf" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        max-width: 720px;
        padding: 32px;
        border-radius: 16px;
        background: #111827;
        box-shadow: 0 10px 30px rgba(0,0,0,.25);
        text-align: center;
      }
      a {
        color: #93c5fd;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        text-decoration: none;
        padding: 12px 18px;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        font-weight: 600;
      }
      .btn.secondary {
        background: transparent;
        border: 1px solid #334155;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Kidpech CV</h1>
      <p>กำลังพาไปยังไฟล์ CV… ถ้าไม่ redirect อัตโนมัติ ให้กดปุ่มด้านล่าง</p>
      <div class="actions">
        <a class="btn" href="./kidpech-cv.pdf">Open CV</a>
        <a class="btn secondary" href="./kidpech-cv.pdf" download>Download CV</a>
      </div>
    </main>
  </body>
</html>
